front:
  text: 通玄祕術序松六夫人立身之本以道德修術固益肌體爲先少年之盛豈顧後衰况人禀三才之貴圓首方足悉符夭地之形不可以自輕失也知言丱角之年樓心於道昔太和初於霅苕之上遇道士馬自然示余祕訣兼玄通如意丸五解之法知言顧慙幽陋罔測玄機時於其間人寰採補延主往往得其一二洎咸通五年春之准南有故友滎陽鄭公示余神丹諸家祕要皆是濟世治療人間一切諸疾延駐之門幷制伏五金八石㸃變造化辟除寒暑絶粒休粮或箭鏃入肉取不去者不限年月深逺㸃摩丹藥其鏃自出有造化之神功在三卷之内好道後學覧之必瑩心駭目其於伏火金石靈丹備在卷中知言輒編次之勒成上中下三卷號曰通玄祕術以奉好尚君子養生之本將貽同志幸勿輕傳耳通玄祕術
