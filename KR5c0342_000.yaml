body:
  text: 金鵝山布衣沈知言集鄭氏三生丹伏火丹砂伏火北庭硇砂伏火龍腦已上三味各一兩半同研如麵以漿水拌令日中乾之後更細研之磁石一兩引針多者為上醋淬搗如麵也鍾乳一兩細研赤石脂三兩粘舌者為上細研右入一瓶子內如法乾了入灰爐中坐瓶子入灰三寸已來即以火二斤逼令通徹即加火至十斤已來漸逼令通赤一炊久藥成入水中以鐵匙打蓋淘冷空開取之其藥靣上白色內紫金色光匙研如麵安於淨地紙襯却以盆覆之一日出火毒後以粟米飯丸如小豆大空心水下三丸解百毒若有人被毒於酒食中喫治心腹痛傳尸病臭腋䵟䵳邪氣惡疰氣及鬼疰氣攻心患者醋調藥末三錢服之神效傳尸病人間惡疾一家不計口數一人死傳飯一人乃至滅族有福者得遇此丹服之一人痊愈則終不傳也其病是急勞黃瘦之疾也若患發背瘡膿血不止者不計瘡在心上心下醋調藥末勻於簿紙上可瘡大小貼之隔日換兼服丸藥不過三五上貼之其瘡漸漸皺斂自合忌諸毒物味即膿血定十日半月平復如故若患頭面上剌痛及頭旋風醋調木三錢服之永除根本若曽服硫黃失飯石毒發者服兩丸立效此是衆藥之君主後即不發也凡燒鍊石藥多見不出火毒便充丸散服食之後補矣將息火毒即發但先出火毒後修合終不發三消病黃連湯下以黃連末同為丸服之亦得隂黃背腫茶下三錢即止背腫是發背之徵也口瘡蜜調塗舌上赤白帶下酒調服之若經陳箭鏃入肉即以苽萋蔓根研汁調藥塗於痕上其鏃自出婦人産後風痛諸寨血氣衝心不可忍者醋酒調三錢服之即止潻咬瘡癢者以荷葉湯洗了藥末塗之即差一切毒蟲癎疾心邪犀角摩水下三錢吐血不定依此服之神效青花丹空青一兩研定粉一兩白石脂半兩光明砂半兩白鹽花桃花石各半兩如無以磁石代之右件藥研如麵入瓶子即以鹽花蓋其上固濟之乾了以一二兩火於瓶四面逼之漸漸近瓶子候熱徹四面著一稱炭火漸漸燒之任火自銷可一餐久如瓶子沸更伺候少時即住待冷定開取藥搗碎水飛去却鹽味乾了入少麝香同研以飯丸丸如麻子大每日空心酒下五丸忌羊血冷水此丹治霍亂肚脹冷氣小子疳蛔腸風女子血氣一切冷疾久逺服之珍妙太陽流珠丹本陽一斤馬牙硝四兩鹽花四兩炒令煙盡北庭三兩右四味同研如麵入瓶實按之上更以少許炒鹽蓋出隂氣了如法固濟即坐一鼎內下先鎔半斤鉛磹藥瓶子了以鐡條擒据定又銷鉛注入鼎令沒瓶子固濟遍了入灰爐中以火養令鎔常半以鉛為候如此一百日滿即出鼎內瓶子別以火養三日常以火五六兩日滿加火煆似赤即住冷取出如琥珀色以寒泉內出火毒研細以棗穰為丸九如菉豆大每日空心茶下兩丸能破一切宿冷風氣癥癖結塊女子宿血氣塊赤白帶下腸風㵼血多年氣痢冷痃吐清水反胃吐食一切諸疾並皆治之黃庭丹硫黃北庭各一兩同研如麵右入一合子內如法固濟了入灰爐中養常以火四兩養一七日復入於合底養一日取出看太陽在合上北庭在合下又重同研依前入合又養七日後更於合底養一日即住取出看太陽不在合上已伏火矣和蠟煮出火毒蠟黑如漆去蠟煿乾重研令鈿以飯丸如粟米粒大每日空心酒或醋湯下兩丸破女子宿血氣身輕健此丹服後百病不生其藥九伏在人身丹田空中十年五歲後若更有身上或因打揲損年深即發疼痛徹心念之云先曽服食靈丹今在身有此疼痛願為救療但以別人手更互相摩其患處須臾覺肉內有物如火來至痛處痛處即愈此是丹藥靈驗也其功不可備述華蓋丹黑鉛三斤絶上者佳即打拍為方響片子鐡作筋穿之作孔以繩串之右取淨瓶甕盛米醋一斗將鉛片子懸於甕中可去醋一寸已來以紙密封固濟甕中每一七日一度開換取鉛片出於淨紙上小篦子及鳥羽毛掃取霜了即却安入但七日一度開取經三四度後即須換却鉛片子力劣矣每鉛霜一兩入龍腦半分同研如粉以天露水為丸丸如梧桐子大每夜臨卧時含一丸便卧勿語任尤自銷此丹能變人頭髮如未白者常隔日舍之一生不白如已白者含此丹至二十日後拔却白者即生黑者不逾六十丸或至一百丸鬢髮盡黳黑色光潤如漆或拔却白者一毛孔內生兩莖黑者此丹世上希有真人金口所傳久而含之延駐顏色年五十人如童兒之貌兼偏去熱毒風筋骨疼痛一生忌大蒜紫金丹伏火北庭五兩别研在後入於藥中生地黃十斤搗碎以生絺絞取汁杏仁失五升去失皮研金州椒半斤蜀附子半斤炮去皮稱之右已上除地黃汁外並搗羅為末便取地汁於鐺中銀鍋為上使炭火一斤已來以灰罨四靣慢慢煎之勿令火急便入諸藥末以柳木篦攪三百下後即入北庭又攪勿住手伹看稠厚可丸丸如梧桐子大每日空心酒下一丸至十丸為度每服後良久以飯壓之女子服亦得忌羊血有娠勿服此丹偏治丈夫五勞七傷一切冷病風氣久服變白駐顔延年補益筋骨神驗之丹黃英丹玉屑兩一砒霜一兩左味一升煮乾左味是醋也蜜陀僧兩乳頭香一兩人糞霜一兩乾者以瓦一口炭火燒之令通赤用瓦蓋候冷定勿令作灰取出右同研如粉以真米醋多年者半升煎乳頭香令銷即入寒食乾蒸餅末更重研如泥以錬蜜為丸如黑豆大偏治冷氣心痛女子血氣心病發空心醋湯下一丸子所患須臾即定先有病根不差者每日空心服一丸至二十服一切病皆除差女子心病有根者止於三十丸一生不發懷孕女子勿服服必損胎忌羊血毒魚等物隂伏紫金丹硫黃五兩碎研水飛鹽花一升右布鹽花半升於小平底鐺子內次鋪太陽末又以餘鹽蓋之別以一瓦器蓋定鐺子面以水沒得藥上二寸已來以濕紙固縫文火養長令魚眼沸七日七夜勿令火絶水耗旋換添之時時開攪勿令粘綴鐺底日滿乾加火煆通赤冷以湯沃去鹽味日中乾之以棗穰為丸丸如小豆大每日空心茶酒任下五丸忌羊血葵萊能治女子血氣暖子官駐顔恱色若患腸風瀉血不止兼赤白帶下曽服藥不差者服此丹永除根本但是冷疾無不治之太陽紫粉丹硫黃馬牙硝汞各三兩右以無灰酒五合旋點於鉢中研三味如泥銀星盡即止日中乾之布於鐺內以碗合定如法固濟乾了於鐺下以炭火三五兩養經半日來漸加火至七八兩經一夜時即住火待冷開取藥以白蜜拌令於青竹筒子中盛貯米飯上蒸一炊久出更研細以棗穰為丸九如梧桐子大每日空心鹽湯及薑湯酒任下三丸治反胃痃癖一切冷病無不差者有孕女子勿服損胎忌鯉魚勝金丹朱砂三兩別研後入雌黃一兩半太陽半兩右並研如粉先以桑灰汁於鐺子中銷二黃成汁下朱砂末攪令自勻相乳入即下灰汁約一斗半中煮三日三夜旋暖灰汁添日滿藥成泣即住刮取藥入鼎子中以文火逼乾隂氣盡重固濟令如法復以火二十斤銀火銷至三五斤即住待冷看藥已在鼎底作一片鑿取成白金研如粉以甘草湯餘甘子瓷器中煮一日出火毒了更研令極細以粟米飯丸丸如菉豆大每日空心冷椒湯下三丸加至五丸治一切風疾半身不遂口不收斂轉動不得者服半兩便差忌羊血綺金丹京黃丹二兩丹砂六兩研汞六兩右並同研汞星盡令細如粉以濃甘草湯拌令日中乾之入瓶中固濟以文武火養一日後漸加火至五斤逼之一日後以火十斤煆令通赤冷定取藥研細以糖蟾之蘇是砂糖也丸如麻子大每日空心冷椒湯下一丸五十已上二丸朝服暮差久服駐顔延年添益精髓補隂陽去腰腳疼痛治冷風氣女子血氣子宫冷絶嗣者服之有子破惡血去邪魅有孕勿服二十已下米有妻室勿服服必衝破頭面反有所損忌鐡粉牡丹下元走馬丹伏火北庭伏火硫黃等分一兩研之如麵右取雀兒二十箇胸上肉及肝以苦酒三升煮酒盡為度研如麵泥絞却筋膜以藥同搗為丸丸如大豆大每日空心酒下五丸補益精氣暖水藏其功如神走馬四神丹二兩悉吝脂朱砂各一分如無朱砂以磁石代之右各研了入汞更細研令汞星盡入固濟瓶先埋水一瓶子平地面坐藥於瓶上斷沃出如此四五度了取出研令細入鹽匱每日以火四兩養四日後取少許火上試伏即住便加火鍛令通赤族冷了取甘草湯拌於飯上蒸一炊久後以飯為丸如菉豆大每曰空心津下三丸治丈夫女子一切冷病去女子宿血暖子宮駐顔悅色興隂陽補益筋骨壯氣脉神效隂伏下元丹汞太各二兩汞曰水銀太曰硫黃敗鐡一斤釜底為上右先取鐵打碎燒令赤投水中後於砂內磨洗令淨去赤水如此三度磨洗令極淨即入瓶中下汞及大入一半瓶水松釜中重湯煮七日七夜水耗即添暖水七日滿出瓶火逼令乾加火鍛令通赤去火投於水中淘去鐵取丹藥澄曬乾入地埋三日出火毒了以伏火北庭同研如粉栗米飯丸丸如菉豆大每日空心茶酒任下兩丸其功效自知如神延生保命丹錬了陽起石伏火硫黃各四兩雄黃一兩生研如麵以水飛之石鹽一兩右前三味同研次入石鹽更研以熟水拌作一毬勿令水多拌了以三重紙裹日中乾之又取白鹽十二斤撫成泥拔杵如漆即止取一瓶可盛得鹽盡者先入一半鹽旋按之令實中心作一坑子可容藥毬者即安於坑子內下餘鹽藥令至瓶口入灰壕周回以火逼令乾陰氣然盡以瓦子蓋瓶子口如法固濟乾了依前入爐瓶上三寸灰灰上一斤炭火飬五日後退火瓶上灰一寸依前火一斤更養五日又去瓶上灰一寸加火至二斤更五日滿住火一炊久取瓶出冷了打破瓶去蓋鹽匱取藥作一團紫色不耗折又細研以沸陽沃沃淘去鹽味露一夜明日以甘草湯拌重湯煮一日久令乾更細研入龍腦麝香少許以棗穰為丸丸如麻子大每日空心酒下三丸極泠五丸治男子女人冷病女子血氣功力不可備述初服旬日忌房事羊血鯉魚大蒜鼓汁等物抵聖固陽丹雄雀兒肝二十四枚羅雀兒時看雀兒項下黑多是雄少是雌也犬內腎並莖切薄片子於丸上乾為末雄蠶蛾四枚十枸杞子穌炒雄黃一分如無雄黃以麝香代之右並細研如粉以雀兒卵為丸如無雀卵以雞子黃代之丸如梧桐子大每日空心酒下五丸治男子陽道衰弱不興水藏積冷腰腳煩疼行步無力服之神效三服已後自知得力不可具述下元補骨丹補骨脂二兩楮實二兩百饋二兩附子二兩炮桑螵蛸三七枚炙殺野田內小桑窠子螳螂寰子是也茯苓二兩蛇牀仁二兩五味子兩二右並搗為散蜜丸丸如菉豆大每日空心酒下十五丸加至二十五丸治男子水藏冷補筋骨建陽益精御仙丹鹿茸三兩破作兩片酥炙令黃香更以生薑汁塗炙破為末天雄一兩炮山附子一兩炮去黑皮後為末莨菪子一兩淘了須煮令牙生炒令黃黑後研硫黃一兩納煮令紫色蛇牀仁一丙碰石霜一兩韭子一兩吵末桂心一兩伏火北庭一兩龍骨一兩右都一處研如泥以羊腎三五隻去脂膜切辟砂盆內以藥同細研為丸丸如梧桐子大每日空心酒下十丸功力自知如無羊腎以猪腎代之亦得羊腎丹白羊腎一具去脂薄切片子於瓦上煿乾為末雀蘇一兩白者雀糞是鍾乳粉一兩如無以鹿茸代之伏火硫黃一兩如無伏火者油煮令紫色右同研如麵粟米飯丸丸如梧桐子大空心冷椒湯下二十丸良久飯壓補暖水藏興陽道年五十人服之筋血壯如二十後生服之功力自知辟暑丹雌黃細研水飛白石脂細研水飛丹砂光明者研細曲灘黃況裏燒水輕飛如磁石飛生搗去赤水右並等分各飛研更如法同研令乳入以鍊白松脂為丸丸如小豆大空心以湯下四丸三兩服後夏月可以衣裘並無炎氣相逼此術曽奉懿宗皇帝修合服食有功效後又與司勳土郎中修合頗有神驗無能知者雄黃赤石脂粘舌者水飛丹砂光明者乾薑右四味等分飛研如麵錬蜜拜白松脂丸九如梧桐子大每日空心酒下四丸十日止一冬不寨冷不著綿衣可以赤體於水中行坐此二術神仙所述宜敬重祕之擲果丹伏火北庭雄雀兒二七箇去頭足腹肚留肝雄雞肝七具白羊血平斤已上除比庭一味以真酒四升浸文武火煎黃盡為末牛黃半兩白馬莖一昗炙末青金半兩人參桂心當歸乾地黃芎藭芍藥防風黃蓍甘草杏仁去尖皮郁李仁石菖蒲兔絲子車前子決明肉蓯蓉草豆蔲黃牛酥已上各一大兩肉豆蔲右搗細為末入酥鍊蜜入前三味相和搗三千下丸丸如菉豆大二十已下每日空心酒下五丸三十已上十丸兩日內有效微轉只可減不可加服後飯辱此丸子治男子無力虛小弱者服三十日增長未有妻室者勿服緑曽近女子來入夢思故號為擲果丸鹿茸散雄蠶蛾八分陽起石十分鍊丁者紫菀八分遠志八分桂心八分桑螵蛸十炙分黃蓍八分兔絲子十分肉蓯蓉八分蛇牀仁八分鍾乳十分酒研入之右並搗為散空心酒下五錢服後暖即減冷即加治男子五勞七傷補益筋血添精起陽去隂汗夜多鬼交失精者一服有效冷飲子茴香三分春夏使根秋冬使子逺志三分去心附子兩顆炮京澤㵼三分草薢三分肉蓯蓉三分桑螵蛸二十枚炙右搗羅為散分為兩貼大羊腎一具去脂膜切細以水一升半煎取五合去滓承露一宿每日空心冷服一合已來每季四劑能去溫疫補下元神驗祕之造化露粉別有口訣五粒松花一云松黃在終南山太一峯者丄南嶽者靈華山明星池邉者入神古者秦王美人服之化為毛仙衛叔𡖖亦服之其花採取十碩置大松木甕中接春時草露浸之若得麥上露最妙不可說兼石崖白蜜亦上好也浸滿二十日看似爛即漉取花置柏木盆踏令如粥即更用新露水淘取稠汁以紗羅濾之置瓷甕中其滓更踏使穰盡為度一如造粉法澄取淀曝乾以柏杵臼搗為末盛紙袋中每袋盛一升其粉亦有玉屑可煮和酪服之甚美益人肥盛延年展皺有子甚健身輕服玉屑一年行及奔馬二年可通道仙矣練花粉别有口訣又取前粉一升以白牛乳三升以大銀鐺煎之使如稀鍚即盛大銅器中縛草船於大釜中重湯煎之以五茄木為箆攪勿住手使熬如膏即更於日中曝乾搗篩為粉餘粉皆准此練法其粉亦有玉屑煮和麻飲服之甘美生髮明目令二百歲老婦人有子三百歲父有子服滿十旬靈不可說其粉鍊訖即別盛紙袋中每袋盛一升釀仙醽别有口訣又取大瓷甕可受兩碩八升取藥芽水一碩五升置盆中以糯米一碩五升炊飯用前粉水桃花杏花乾末各五大斗和蒸炊拌饙亦用粉水拌其釜下所然柴亦用金鹽本五茄也陽實木松木也餘者並不堪炊飯熟停寒溫適所即入大盆中取花鍊乳粉五斗妙麥麵二十斤搗作末熬黃停冷相和盆中熟揉相入取蓮子三斗茯苓八斤搗作末入前盆中苣蕂二斗熬香搗作末和入盆中又取生地黃汁二斗和拌即入甕中蜜封頭滿三七日開看中心有一盞渌醽半赤如琉璃色是藥精英酌而服之可以長生餘者盡壓取汁别盛三瓷甕中即取金鹽花玉豉花共兩碩分入三甕中更炊糯米兩碩分入三甕中必使寒溫得所仍以麴三斗搗作末和之使封閉滿七日即熟澄漉別盛甚香美服神驗凡服法取雞鳴時於東方鋪五色綵為太玄老君座其服藥人著道士衣執簡在西立面向東望太陽出處想上帝玉女如在目前燒香啓請云大道天尊願垂聖護使藥山神王並甘露海神持赤瓊花五添弟子醽飮使弟子服之延壽還童即大濟蒼生忠孝君父啓請訖即取白茅七束分為七座座上各敷絳繒七尺取銀杯子七箇共盛醽九合分置七座上呪云上清妙醽太玄降精我今勤服令我長生呪訖即各取杯醽盛一大五尊中分為三服之令人甚健初服十日令人體多汗十日已後即無汗使人身漸香滑若琉璃滿六十日瓊骨鮮潤七十日丹田麗明九十日顏如桃李一百日皓髮變青半年八十老翁却如三十壯少令人力可百夫再一年神㑹通晤二年可為地仙三年雲升可致也服此藥莫限早晚須即服之仍量性多少若服至十石骨髓俱換為仙矣此方要妙萬寶莫傳如其輕泄殃及七祖不授下士惟傳大仙尹喜頂戴乃往洞府諸仙受此咸盡飛騰若欲合萬仙來帥諸靈衛侍即取白龍骨為粉並赤金粉和而服之百無所忌唯須齊潔合之無食臭味謹如仙法其造藥訣列之於別卷採樂芽訣王月一日巳後採陽坡百草芽者是百草藥新芽兼採百草如藥牛微小即軟根代之欵冬芽五斗括蔞芽五牛巴㦸天芽五斗瓦匕㦸天芽以竹芽代之麥門冬芽五斗柴胡芽五斗天門冬芽五斗紫菊芽五斗覆盆子芽五斗地榆芽六斗旋覆芽六斗連錢芽五斗無連錢芽以細辛代之最妙一名積靈革防風芽五斗無防風芽以紫蘭芽代之若得防風根取汁最上茈胡芽五斗鼠粘芽五斗車前芽五斗升麻芽五斗無升麻芽以麻黃代之忍冬芽五斗無忍冬芽取葉莖蒸壓取其汁皆無只以水蘇代之萎蕤芽五斗白茅芽一頃地黃芽一碩赤箭根芽三斗黃岑芽五斗若無只取嫩根一百斤壓取汁皆無以白蒿代之能令黑髮菝葜芽五斗芍藥芽六斗白芷芽五斗薯蕷芽六斗兼别取根作粉和麴熬之共釀麥門冬汁兩碩五斗牛膝汁一碩五斗地黃汁一碩五斗口訣曰藥草芽多溫為春陽氣盛必須揀擇良者其陽坡百草芽取法且連根斸取即摘取芽於乾土塊上試之汁入土不起者是良收之土分起者不堪用去之若先曽服丹乳金石等即多取前件藥芽少取百草芽通玄祕術
